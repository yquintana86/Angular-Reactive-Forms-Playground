<h2>Pages</h2>
<hr>
<h3 class="mt-3">reactive</h3>
<ul class="list-group">
@for (item of reactiveMenu; track $index) {
  <li [routerLink]="item.router"
       routerLinkActive="active"
         class="list-group-item">{{item.title}}</li>
}
</ul>

<hr>
<h3>Authentication</h3>
<ul class="list-group">
  @for (item of authMenu; track $index) {
    <li [routerLink]="item.router"
        routerLinkActive="active"
        class="list-group-item">{{item.title}}</li>
  }
</ul>
